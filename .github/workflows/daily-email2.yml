name: Daily Email Report

on:
  schedule:
    # Run every morning at 11:45 UTC (6:45 my time)
    - cron: '45 11 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  send-daily-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance; fi

      - name: Run-Python-script
        run: python .github/workflows/my.py
    
      - name: Send mail
        uses: dawidd6/action-send-mail@v16
        with:
          # Use secrets defined in the repository settings
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL1_USERNAME }}
          password: ${{ secrets.EMAIL1_PASSWORD }}
          subject: "Your Daily Morning Message"
          to: ${{ secrets.EMAIL1_USERNAME }}
          from: ${{ secrets.EMAIL1_USERNAME }}
          # The email body can be plain text or HTML
          body: Good morning! This is the daily email from my first AI Agent.
            The current AVGO stock price is ${{ steps.run-script.outputs.my_output_variable }}

            
  
