name: Daily Email Report

on:
  schedule:
    # Run every morning at 7 AM UTC
    # (adjust cron to your preferred time, check crontab.guru for help)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  send-daily-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          # Use secrets defined in the repository settings
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Your Daily Morning Message"
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: ${{ secrets.MAIL_SENDER }}
          # The email body can be plain text or HTML
          body: "Good morning! This is your automated daily message from GitHub Actions."
